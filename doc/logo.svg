<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- تدرج للدرع -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <!-- تدرج للأحرف -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b61ff;stop-opacity:1" />
    </linearGradient>
    <!-- توهج الشبكة العصبية -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <!-- تدرج للدماغ -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7b61ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- خلفية داكنة (اختياري: شفافة) -->
  <rect width="500" height="500" fill="transparent" rx="30"/>

  <!-- دوائر توهج خلفية (تأثير شبكة عصبية) -->
  <circle cx="250" cy="230" r="150" fill="url(#glowGrad)" />
  <circle cx="140" cy="140" r="80" fill="url(#glowGrad)" opacity="0.4" />
  <circle cx="360" cy="140" r="80" fill="url(#glowGrad)" opacity="0.4" />

  <!-- خطوط شبكة (تمثل الاتصال والتعلم) -->
  <g stroke="#00d4ff" stroke-width="1.5" opacity="0.2">
    <line x1="100" y1="100" x2="400" y2="100" />
    <line x1="100" y1="200" x2="400" y2="200" />
    <line x1="200" y1="80" x2="200" y2="360" />
    <line x1="300" y1="80" x2="300" y2="360" />
    <!-- وصلات قطرية -->
    <line x1="100" y1="100" x2="250" y2="230" />
    <line x1="400" y1="100" x2="250" y2="230" />
    <line x1="100" y1="300" x2="250" y2="230" />
    <line x1="400" y1="300" x2="250" y2="230" />
  </g>

  <!-- عقد الشبكة (دوائر صغيرة مضيئة) -->
  <circle cx="100" cy="100" r="4" fill="#00d4ff" opacity="0.8" />
  <circle cx="400" cy="100" r="4" fill="#00d4ff" opacity="0.8" />
  <circle cx="100" cy="300" r="4" fill="#00d4ff" opacity="0.8" />
  <circle cx="400" cy="300" r="4" fill="#00d4ff" opacity="0.8" />
  <circle cx="250" cy="80" r="4" fill="#7b61ff" opacity="0.8" />
  <circle cx="250" cy="360" r="4" fill="#7b61ff" opacity="0.8" />
  <circle cx="200" cy="150" r="3" fill="#00d4ff" opacity="0.6" />
  <circle cx="300" cy="150" r="3" fill="#00d4ff" opacity="0.6" />
  <circle cx="200" cy="310" r="3" fill="#00d4ff" opacity="0.6" />
  <circle cx="300" cy="310" r="3" fill="#00d4ff" opacity="0.6" />

  <!-- درع الأمن السيبراني -->
  <path d="M250 60 L390 110 L390 280 Q390 390 250 430 Q110 390 110 280 L110 110 Z"
        fill="url(#shieldGrad)" stroke="#00d4ff" stroke-width="3" opacity="0.9" />

  <!-- حد داخلي للدرع -->
  <path d="M250 80 L370 125 L370 275 Q370 370 250 405 Q130 370 130 275 L130 125 Z"
        fill="none" stroke="#4cc9f0" stroke-width="1.5" opacity="0.4" />

  <!-- أيقونة الدماغ (التعلم المعزز) في وسط الدرع -->
  <!-- مسارات الدماغ مبسطة -->
  <g transform="translate(250,230)" fill="none" stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- النصف الأيسر -->
    <path d="M-30 -35 C-45 -50, -55 -30, -45 -15 C-35 -5, -25 -10, -30 -20" />
    <path d="M-40 -25 C-55 -15, -55 10, -40 20 C-25 30, -15 15, -25 5" />
    <!-- النصف الأيمن -->
    <path d="M30 -35 C45 -50, 55 -30, 45 -15 C35 -5, 25 -10, 30 -20" />
    <path d="M40 -25 C55 -15, 55 10, 40 20 C25 30, 15 15, 25 5" />
    <!-- اتصال مركزي -->
    <path d="M-10 -20 C0 -30, 10 -30, 20 -20" />
    <path d="M-10 -5 C0 5, 10 5, 20 -5" stroke-width="2" />
  </g>

  <!-- نقاط متوهجة على الدماغ تمثل الخلايا العصبية -->
  <circle cx="220" cy="195" r="3" fill="#ffffff" opacity="0.8" />
  <circle cx="280" cy="195" r="3" fill="#ffffff" opacity="0.8" />
  <circle cx="210" cy="245" r="3" fill="#ffffff" opacity="0.8" />
  <circle cx="290" cy="245" r="3" fill="#ffffff" opacity="0.8" />
  <circle cx="250" cy="220" r="4" fill="#ffffff" opacity="0.9" />

  <!-- الأحرف S C D في الأسفل -->
  <text x="250" y="360" text-anchor="middle" font-family="'Courier New', monospace" font-size="50" font-weight="bold" fill="url(#textGrad)" letter-spacing="8">
    SCD
  </text>

  <!-- نص فرعي: Framework -->
  <text x="250" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#8892b0" letter-spacing="4">
    FRAMEWORK
  </text>

  <!-- أيقونات صغيرة تمثل الوحدات (Scan, Recon, Exploit) على الجوانب -->
  <!-- Scan: عدسة مكبرة على اليسار -->
  <g transform="translate(130,160)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#4cc9f0" stroke-width="2" />
    <line x1="7" y1="7" x2="15" y2="15" stroke="#4cc9f0" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Recon: عين على اليمين -->
  <g transform="translate(370,160)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="none" stroke="#4cc9f0" stroke-width="2" />
    <circle cx="0" cy="0" r="3" fill="#4cc9f0" />
    <path d="M-8 -4 Q0 -10 8 -4" fill="none" stroke="#4cc9f0" stroke-width="1.5" />
  </g>

  <!-- Exploit: صاعقة برق في الأسفل (يمين ويسار) غير موجودة هنا، سنكتفي بـ Scan و Recon -->
  <!-- يمكن إضافة ترس صغير أسفل اليسار يرمز للـ Exploit -->
  <g transform="translate(250,430)">
    <path d="M-15 -5 L15 -5 L12 0 L18 0 L-18 0 L-12 0 Z" fill="#00d4ff" opacity="0.6" />
    <!-- تبسيط للترس -->
  </g>
</svg>